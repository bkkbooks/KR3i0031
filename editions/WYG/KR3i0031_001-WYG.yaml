body:
  text: 劉氏菊譜宋劉蒙撰譜叙草木之有花浮冶而易壊凡天下輕脆難乆之物者皆以花比之宜非正人達士堅操篤行之所好也然余嘗觀屈原之為文香草龍鳯以比忠正而菊與菌桂荃蕙蘭芷江蘺同為所取又松者天下歳寒堅正之木也而陶淵明乃以松名配菊連語而稱之夫屈原淵明寔皆正人達士堅操篤行之流至於菊猶貴重之如此是菊雖以花為名固與浮冶易壊之物不可同年而語也且菊有異於物者凡花皆以春盛而實者以秋成其根抵枝葉無物不然而菊獨以秋花悅茂於風霜揺落之時此其得時者異也有花葉者花未必可食而康風子乃以食菊僊又本草云以九月取花乆服輕身耐老此其花異也花可食者根葉未必可食而陸龜蒙云春苗恣肥得以採擷供左右杯按又本草云以正月取根此其根葉異也夫以一草之微自本至末無非可食有功於人者加以花色香態纎妙閑雅可為丘壑燕靜之娛然則古人取其香以比徳而配之以嵗寒之操夫豈獨然而已哉洛陽之風俗大抵好花菊品之數比他州為盛劉元孫伯紹者隱居伊水之瀍萃諸菊而植之朝夕嘯詠乎其側蓋有意譜之而未假也崇寧甲申九月余得為龍門之游得至君居坐於舒嘯堂上顧玩而樂之於是相與訂論訪其居之未嘗有因次第焉夫牡丹荔枝香筍茶竹硯墨之類有名數者前人皆譜録今菊品之盛至於三十餘種可以類聚而記之故隨其名品論叙于左以列諸譜之次說疑或謂菊與苦薏有兩種而陶隠居日華子所記皆無千葉花疑今譜中或有非菊者也然余嘗讀隱居之說以謂莖紫色青作蒿艾氣為苦薏今余所記菊中雖有莖青者然而為氣香味甘枝葉纎少或有味苦者而紫色細莖亦無蒿艾之氣又今人間相傳為菊其已乆矣故未能輕取舊說而棄之也凡植物之見取於人者栽培灌溉不失其宜則枝葉華實無不猥大至其氣之所聚乃有連理合穎雙葉並蔕之瑞而況於花有變而為千葉者乎日華子曰花大者為甘菊花小而苦者為野菊若種園蔬肥沃之處復同一體是小可變而為甘也如是則單葉變而為千葉亦有之矣牡丹芍藥皆為藥中所用隱居等但記花之紅白亦不云有千葉者今二花生于山野類皆單葉小花至於園圃肥沃之地栽鉏糞養皆為千葉然後大花千葉變態百出然則奚獨至於菊而疑之注本草者謂菊一名日精按說文從鞠而爾雅菊治蘠月令云鞠有黄華疑皆傳寫之誤歟若夫馬藺為紫菊瞿麥為大菊烏喙苗為鴛鴦菊蔙覆花為艾菊與其他妄濫而竊菊名者皆所不取云定品或問菊奚先曰先色與香而後態然則色奚先曰黄者中之色土王季月而菊以九月花金土之應相生而相得者也其次莫若白西方金氣之應菊以秋開則於氣為鍾焉陳藏器云白菊生平澤花紫者白之變紅者紫之變也此紫所以為白之次而紅所以為紫之次云有色矣而又有香有香矣而後有態是其為花之尤者也或又曰花以艶媚為悅而子以態為後歟曰吾嘗聞於古人矣妍卉繁花為小人而松竹蘭菊為君子安有君子而以態為悅乎至於具香與色而又有態是猶君子而有威儀也菊有名龍腦者具香與色而態不足者也菊有名都勝者具色與態而香不足者也菊之黄者未必皆勝而置于前者正其色也菊之白者未必皆劣而列于中者次其色也新羅香毬玉鈴之類則以瓌異而升焉至於順聖楊妃之類轉紅受色不正故雖有芬香態度不得與諸花爭也然余獨以龍腦為諸花之冠是故君子貴其質焉後之視此譜者觸類而求之則意可見也花總數三十有五品以品視之可以見花之髙下以花視之可以知品之得失具列之如左云龍腦第一龍腦一名小銀臺出京師開以九月末類金萬鈴而葉尖謂花上葉色類人間染鬱金而外葉純白夫黄菊有深淺色兩種而是花獨得深淺之中又其香氣芬烈甚似龍腦是花與香色俱可貴也諸菊或以態度爭先者然標致髙遠譬如大人君子雍容雅淡識與不識固將見而悅之誠未易以妖冶嫵媚為勝也新羅第二新羅一名玉梅一名倭菊或云出海外國中開以九月末千葉純白長短相次而花葉尖薄鮮明瑩徹若瓊瑶然花始開時中有青黄細葉如花蘂之狀盛開之後細葉舒展迺始見其蘂焉枝正紫色葉青支股而小凡菊類多尖闕而此花之蘂分為五出如人之有支股也與花相映標韻髙雅似非尋常之比也然余觀諸菊開頭枝葉有多少繁簡之失如桃花菊則恨葉多如毬子菊則恨花繁此菊一枝多開一花雖有旁枝亦少雙頭並開者正素獨立之意故詳紀焉都勝第三都勝出陳州開以九月末鵝黄千葉葉形圓厚有雙紋花葉大者每葉上皆有雙畫直紋如人手紋狀而内外大小重疊相次蓬蓬然疑造物者著意為之凡花形千葉如金鈴則太厚單葉如大金鈴則太薄惟都勝新羅御愛棣棠頗得厚薄之中而都勝又其最美者也余嘗謂菊之為花皆以香色態度為尚而枝常恨麤葉常恨大凡菊無態度者枝葉累之也此菊細枝少葉嫋嫋有態而俗以都勝目之其有取于此乎花有淺深兩色蓋初開時色深爾御愛第四御愛出京師開以九月末一名笑靨一名喜容淡黄千葉葉有雙紋齊短而闊葉端皆有兩闕内外鱗次亦有瓌異之形但恨枝榦差麤不得與都勝爭先爾葉比諸菊最小而青每葉不過如指面大或云出禁中因此得名玉毬第五玉毬出陳州開以九月末多葉白花近蘂微有紅色花外大葉有雙紋瑩白齊長而蘂中小葉如剪茸初開時有青殻乆乃退去盛開後小葉舒展皆與花外長葉相次倒垂以玉毬目之者以其有圓聚之形也枝榦不甚麤葉尖長無刓闕枝葉皆有浮毛頗與諸菊異然顔色標致固自不凡近年以來方有此本好事者競求致一二本之直比于常菊蓋十倍焉玉鈴第六玉鈴未詳所出開以九月中純白千葉中有細鈴甚類大金鈴菊凡白花中如玉毬新羅形態髙雅出於其上而此菊與之爭勝故余特次二菊觀名求實似無愧焉金萬鈴第七金萬鈴未詳所出開以九月末深黄千葉菊以黄為正而鈴以金為質是菊正黄色而葉有鐸形則於名實兩無愧也菊有花宻枝􅄶者人間謂之鞍子菊實與此花一種特以地脈肥盛使之然爾又有大萬鈴大金鈴蜂鈴之類或形色不正比之此花特為竊有其名也大金鈴第八大金鈴未詳所出開以九月末深黄有鈴者皆如鐸鈴之形而此花之中實皆五出細花下有大葉承之每葉之有雙紋枝與常菊相似葉大而疎一枝不過十餘葉俗名大金鈴蓋以花形似秋萬鈴爾銀臺第九銀臺深黄萬銀鈴葉有五出而下有雙紋白葉開之初疑與龍腦菊一種但花形差大且不甚香耳俗謂龍腦菊為小銀臺蓋以相似故也枝榦纎柔葉青黄而麤疎近出洛陽水北小民家未多見也棣棠第十棣棠出西京開以九月末深黄雙紋多葉自中至外長短相次如千葉棣棠狀凡黄菊類多小花如都勝御愛雖稍大而色皆淺黄其最大者若大金鈴菊則又單葉淺薄無甚佳處唯此花深黄多葉大於諸菊而又枝葉甚青一枝聚生至十餘朶花葉相映顔色鮮好甚可愛也蜂鈴第十一蜂鈴開以九月中千葉深黄花形圓小而中有鈴葉擁聚蜂起細視若有蜂窠之狀大抵此花似金萬鈴獨以花形差小而尖又有細蘂出鈴葉中以此别爾鵝毛第十二鵝毛未詳所出開以九月末淡黄纎細如毛生於花萼上凡菊大率花心皆細葉而下有大葉承之間謂之托葉今比毛花自内至外葉皆一等但長短上下有次爾花形小於金萬鈴亦近年新花也毬子第十三毬子未詳所出開以九月中深黄千葉尖細重疊皆有倫理一枝之杪聚生百餘花若小毬諸菊黄花最小無過此者然枝青葉碧花色鮮明相映尤好也夏金鈴第十四夏金鈴出西京開以六月深黄千葉甚與金萬鈴相類而花頭瘦小不甚鮮茂蓋以生非時故也或曰非時而花失其正也而可置於上乎曰其香是也其色是也若生非其時則係於天者也夫特以生非其時而置之諸菊之上香色不足論矣奚以貴質哉秋金鈴第十五秋金鈴出西京開以九月中深黄雙紋重葉花中細蘂皆出小鈴萼中其萼亦如鈴葉但比花葉短闊而青故譜中謂鈴葉鈴萼者以此有如蜂鈴状余頃年至京師始見此菊戚里相傳以為愛玩其後菊品漸盛香色形態徃徃出此花上而人之貴愛寞落矣然花色正黄未應便置諸菊之下也金錢第十六金錢出西京開以九月末深黄雙紋重葉似大金菊而花形圓齊頗類滴漏花欄檻處處有亦名滴滴金亦名金錢子人未識者或以為棣棠菊或以為大金鈴但以花葉辨之乃可見爾鄧州黄第十七鄧州黄開以九月末單葉雙紋深於鵝黄而淺於鬱金中有細葉出鈴萼上形様甚似鄧州白但小差爾按陶隱居云南陽酈縣有黄菊而白者以五月採今人間相傳多以白菊為貴又採時乃以九月頗與古說相異然黄菊味甘氣香枝榦葉形全類白菊疑乃𢎞景所記爾薔薇第十八薔薇未詳所出九月末開深黄雙紋單葉有黄細蘂出小鈴萼中枝榦差細葉有支股而圓今薔薇有紅黄千葉單葉兩種而單葉者差淡人間謂之野薔薇蓋以單葉者爾黄二色第十九黄二色九月末開鵝黄雙紋多葉一花之間自有深淡兩色然此花甚類薔薇菊惟形差小又近蘂多有亂葉不然亦不辨其異種也甘菊第二十甘菊生雍州川澤開以九月深黄單葉閭巷小人且能識之固不待記而後見也然余竊謂古菊未有瓌異如今者而陶淵明張景陽謝希逸潘安仁等或愛其香或詠其色或採之於東籬或泛之於酒斚疑皆今之甘菊花也夫以古人賦詠賞愛至於如此而一旦以今菊之盛遂將棄而不取是豈仁人君子之於物哉故余特以甘菊置於白紫紅菊三品之上其大意如此酴醿第二十一酴醿出相州開以九月末純白千葉自中至外長短相次花之大小正如酴醿而枝榦纎柔頗有態度若花葉稍圓加以檀蘂真酴醿也玉盆第二十二玉盆出滑州開以九月末多葉黄心内深外淡而下有闊白大葉連綴承之有如盆盂中盛花狀然人間相傳以謂玉盆菊者大率皆黄心碎葉初不知其得名之由後請疑於識者始以真菊相示乃知物之見名於人者必有形似之實非講尋無倦或有所遺爾鄧州白第二十三鄧州白九月末開單葉雙紋白花中有細蘂出鈴萼中凡菊單葉如薔薇菊之類大率花葉圓密相次花葉謂頭上白葉非枝葉之葉他稱花葉倣此而此花葉皆尖細相去稀疎然香比諸菊甚烈而又正為藥中所用蓋鄧州菊潭所出爾枝榦甚纎柔葉端有支股而長亦不甚青白菊第二十四白菊單葉白花蘂與鄧州白相類但花葉差闊相次圓密而枝葉麤繁人未識者多謂此為鄧州白余亦信以為然後劉伯紹訪得其真菊較見其異故譜中别開鄧州白而正其名曰白菊銀盆第二十五銀盆出西京開以九月中花中皆細鈴比夏秋萬鈴差疎而形色似之鈴葉之下别有雙紋白葉故人間謂之銀盆者以其下葉正白故也此菊近出未多見至其茂肥得地則一花之大有若盆者焉順聖淺紫第二十六順聖淺紫出陳州鄧州九月中方開多葉葉比諸菊最大一花不過六七葉而每葉盤疊凡三四重花葉空處間有筒葉輔之大率花形枝榦類垂絲棣棠但色紫花大爾余所記菊中惟此最大而風流態度又為可貴獨恨此花非黄白不得與諸菊爭先也夏萬鈴第二十七夏萬鈴出鄜州開以五月紫色細鈴生於雙紋大葉之上以時别之者以有秋時紫花故也或以菊皆秋生花而疑此菊獨以夏盛按靈寳方曰菊花紫白又陶隱居云五月採今此花紫色而開於夏時是其得時之正也夫何疑哉秋萬鈴第二十八秋萬鈴出鄜州開以九月中千葉淺紫其中細葉盡為五出鐸形而下有雙紋大葉承之諸菊如棣棠是其最大獨此菊與順聖過焉或云與夏花一種但秋夏再開爾今人間起草為花多作此菊蓋以其瓌美可愛故也繡毬第二十九繡毬出西京開以九月中千葉紫花花葉尖闊相次聚生如金鈴菊中鈴葉之狀大率此花似荔枝菊花中無筒葉而萼邊正平爾花形之大有若大金鈴菊者焉荔枝第三十荔枝純紫出西京九月中開千葉紫花葉卷為筒謂花葉也凡菊鈴葉有五出皆如鐸鈴之形又有卷生為筒無尖闕者故謂之筒葉他與此同大小相間凡菊鈴并蘂皆生托葉之上葉背乃有花萼與枝相連而此菊上下左右攅聚而生故俗以為荔枝者以其花形正圓故也花有紅者與此同名而純紫者蓋不多爾垂絲粉紅第三十一垂絲粉紅出西京九月中開千葉葉細如茸攅聚相次而花下亦無托葉人以垂絲目之者蓋以枝榦纎弱故也楊妃第三十二楊妃未詳所出九月中開粉紅千葉散如亂茸而枝葉細小嫋嫋有態此實菊之柔媚為悅者也合蟬第三十三合蟬未詳所出九月末開粉紅筒葉花形細者與蘂雜比方盛開時筒之大者裂為兩翅如飛舞狀一枝之杪凡三四花然大率皆筒葉如荔枝菊有蟬形者蓋不多爾紅二色第三十四紅二色出西京開以九月末千葉深淡紅叢有兩色而花葉之中間生筒葉大小相映方盛開時筒之大者裂為二三與花葉相雜比茸茸然花心與筒葉中有青黄紅蘂頗與諸菊相異然余恠桃花石榴川木𤓰之類或有一株異色者每以造物之付受有不平歟抑將見其巧歟今菊之變其黄白而為粉紅深紫固可恠而又一株亦有異色並生者也是亦深可恠歟花之形度無甚佳處特記其異爾桃花第三十五桃花粉紅單葉中有黄蘂其色正類桃花俗以此名蓋以言其色爾花之形度雖不甚佳而開於諸菊未有之前故人視此菊如木中之梅焉枝葉最繁宻或有無花者則一葉之大踰數寸也雜記叙遺余聞有麝香菊者黄花千葉以香得名有錦菊者粉紅碎花以色得名有孩兒菊者粉紅青萼以形得名有金絲菊者紫花黄心以蘂得名嘗訪於好事求於園圃既未之見而說者謂孩兒菊與桃花一種又云種花者剪掐為之至錦菊金絲則或有言其與别名非菊者若麝香菊則又出陽翟洛人實未之見夫既已記之而定其品之髙下又因傳聞附㑹而亂其先後之次是非余譜菊之意故特論其名色列於記花之後以俟博物之君子證其謬焉補意余嘗恠古人之於菊雖賦詠嗟嘆嘗見於文詞而未嘗說其花瓌異如吾譜中所記者疑古之品未若今日之富也今遂有三十五種又嘗聞於蒔花者云花之形色變易如牡丹之類歳取其變者以為新今此菊亦疑所變也今之所譜雖自謂甚富然搜訪所有未至與花之變易後出則有待於好事者焉君子之於文亦闕其不知者斯可矣若夫掇擷治療之方栽培灌種之宜宜觀於方冊而問於老圃不待予言也拾遺黄碧單葉兩種生於山野籬落之間宜若無足取者然譜中諸菊多以香色態度為人愛好剪鉏移徙或至傷生而是花與之均賦一性同受一色俱有此名而能遠迹山野保其自然固亦無羡於諸菊也余嘉其大意而收之又不敢雜置諸菊之中故特列之於後云劉氏菊譜
