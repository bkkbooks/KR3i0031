body:
  text: 提要劉氏菊譜譜録類三草木禽魚之屬臣等謹案劉氏菊譜宋劉蒙撰蒙彭城人不詳其仕履其敘中載崇寧甲申為龍門之遊訪劉元孫所居相與訂論為此譜蓋徽宗時人故王得臣麈史中已引其説焦竑國史經籍志列於范成大之後者誤也其書首譜敘次説疑次定品次列菊名三十五條各敘其種類形色而評次之以龍腦為第一而以雜記三萹終焉書中所論諸菊名品各詳所出之地自汴梁以及西京陳州鄧州雍州相州滑州鄜州陽翟諸處大抵皆中州物産而萃聚於洛陽園圃中者與後來史正志范成大之專志吳中蒔植者不同然如金錢酴醿諸名史范二志亦具載焉意者本出自河北而傳其種於江左者歟史氏菊譜譜録類三草木禽魚之屬臣等謹案史氏菊譜宋史正志撰正志字志道江都人紹興二十一年進士纍除司農丞孝宗朝歷守廬揚建康官至吏部侍郎歸老姑蘇自號吳門老圃所著有清暉閣詩建康志菊圃集諸書今俱失傳此本載入左圭百川學海中宋史藝文志亦著於録所列凡二十七種前有自序稱自昔好事者為牡丹芍藥海棠竹筍作譜記者多矣獨菊花未有為之譜者余姑以所見為之云云然劉蒙菊譜已在前正志殆未之見而為是言耳末有後序一首辨王安石歐陽修所爭楚詞落英事謂菊有落有不落者譏二人於草木之名未能盡識其説甚詳乃向來所未發世俗所傳蘇軾以嗤點安石詩誤謫黃州其地菊皆落瓣軾始愧服其言甚怪誕不根明人作説部者或多信之得此亦可以證其妄也范村梅譜譜録類三草木禽魚之屬臣等謹案范村梅譜宋范成大撰成大有桂海虞衡志諸書已别著録此乃記所居范村之梅凡十二種前後皆有自序梅之為物其名雖見於尚書禮經然皆取其實而不以花著自唐人題咏競作始以香色重於時成大創為此編稍辨次其品目然如緑萼梅一種今在吳下已為常植而成大乃矜為人間不多見之物則土宜之異或者隨時遷改歟又楊無咎畫梅有名後世皆珍為絶作而成大後序乃謂其畫大略皆如吳下之氣條雖筆法竒峭去梅實遠與宋孝宗詆無咎為村梅者所論相近蓋其時猶未甚重無咎之畫至嘉熙淳祐間趙希鵠作洞天清録始稱江西人得無咎一幅梅價不下百千匹是亦可以覘世變也通考以此書與所作菊譜合為一題曰范村梅菊譜二卷然觀其自序實别為書今故仍各加標目焉范村菊譜譜録類三草木禽魚之屬臣等謹案范村菊譜宋范成大撰記所居范村之菊成於淳熙丙午嵗蓋其以資政殿學士領宫祠家居時所作自序稱所得三十六種而此本所載凡黃者十六種白者十五種雜色四種實止三十五種尚闕其一疑傳寫所脫佚也菊之種類至繁其形色變幻不一場師老圃因隨時各為之題品名目遂日出而不窮以此譜與史正志譜相核其異同已十之五六而成大但記家園所植採擷亦未盡賅備然敘次頗有理致視他家為尤工至種植之法黃省曾謂花之朵視種之大小而存之大者四五蘂次者七八蘂又次者十餘蘂今吳下藝菊者猶用此法其力既厚故花皆碩大豐縟成大乃謂一幹所出數千百朵婆娑團植幾於俗所謂千頭菊者此則今古好尚之不同矣乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
